name: remote-vllm CI

on:
  pull_request:
    branches:
      - vllm-ci
  push:
    branches:
      - vllm-ci
  workflow_dispatch:

defaults:
  run:
    shell: bash

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout llama-stack
        uses: actions/checkout@v4
        with:
          # https://github.com/actions/checkout/issues/249
          fetch-depth: 0

      - name: Echo commit SHA
        run: |
          echo "Triggered on commit SHA: ${{ github.event.inputs.commit_sha }}"
          git rev-parse HEAD

      - name: Checkout vllm
        uses: actions/checkout@v4
        with:
          repository: "vllm-project/vllm"
          ref: "v0.7.2"
          path: "vllm"
          # https://github.com/actions/checkout/issues/249
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: |
            **/pyproject.toml
            **/requirements*.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install uv
          uv sync --extra dev
          uv pip install -e .

      - name: Build providers
        run: |
          source .venv/bin/activate
          llama stack build --template remote-vllm --image-type venv

      - name: Build vLLM Container
        uses: docker/build-push-action@v6
        with:
          context: vllm
          file: vllm/Dockerfile.cpu
          load: true
          shm-size: 4g
          tags: vllm-cpu-env:latest

      - name: Run vLLM Container
        run: |
          docker run --rm --network=host --env=HF_TOKEN vllm-cpu-env:latest --model meta-llama/Llama-3.2-3B-Instruct --port 8000 --enable-auto-tool-choice --tool-call-parser llama3_json --max-model-len 16000 &
          curl --head -X GET --retry 60 --retry-connrefused --retry-delay 10 http://localhost:8000/v1/models
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}

      - name: Run provider inference tests
        run: |
          source .venv/bin/activate
          VLLM_URL="http://localhost:8000/v1" INFERENCE_MODEL="meta-llama/Llama-3.2-3B-Instruct" pytest -s -v llama_stack/providers/tests/inference/test_text_inference.py --providers "inference=vllm_remote"

      - name: Run client sdk tests
        run: |
          source .venv/bin/activate
          VLLM_URL="http://localhost:8000/v1" INFERENCE_MODEL="meta-llama/Llama-3.2-3B-Instruct" LLAMA_STACK_CONFIG=remote-vllm pytest -v tests/client-sdk/inference/test_text_inference.py --inference-model "meta-llama/Llama-3.2-3B-Instruct"
