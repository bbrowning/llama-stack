name: remote-vllm CI

on:
  pull_request:
    branches:
      - vllm-ci
  push:
    branches:
      - vllm-ci
  workflow_dispatch:

defaults:
  run:
    shell: bash

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout llama-stack
        uses: actions/checkout@v4
        with:
          # https://github.com/actions/checkout/issues/249
          fetch-depth: 0

      - name: Checkout vllm
        uses: actions/checkout@v4
        with:
          repository: "vllm-project/vllm"
          ref: "v0.7.2"
          path: "vllm"
          # https://github.com/actions/checkout/issues/249
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: |
            **/pyproject.toml
            **/requirements*.txt

      - name: Build vLLM Container
        uses: docker/build-push-action@v6
        working-directory: ./vllm
        with:
          context: .
          file: Dockerfile.cpu
          load: true
          shm-size: 4g
          tags: vllm-cpu-env:latest

      - name: Run vLLM Container
        run: |
          docker run --rm --network=host --env=HF_TOKEN vllm-cpu-env:latest --model meta-llama/Llama-3.2-1B-Instruct --port 8000 --enable-auto-tool-choice --tool-call-parser llama3_json
